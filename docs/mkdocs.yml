site_name: Quản lý Sinh Viên — Docs
site_description: Tài liệu kỹ thuật hệ thống Quản lý Sinh Viên (WCF REST + ExtJS + SQL Server)
site_author: Giang Văn Hưng

theme:
  name: material
  language: vi
  palette:
    - scheme: default
      primary: indigo
      accent: deep-purple
      toggle:
        icon: material/weather-sunny
        name: Chuyển sang chế độ tối
    - scheme: slate
      primary: indigo
      accent: deep-purple
      toggle:
        icon: material/weather-night
        name: Chuyển sang chế độ sáng
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.tabs.link
    - content.code.copy
    - search.highlight
    - search.suggest
  custom_dir: overrides

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - attr_list
  - md_in_html

plugins:
  - search

nav:
  - Tổng quan: index.md
  - Bài toán: baitoan.md
  - Giải pháp & Kiến trúc: Giaiphapcongnghe.md
  - Cơ sở dữ liệu: database.md
  - API Reference: api.md
  - Giao diện: giaodien.md
  - Kiến thức kỹ thuật: kienthuc.md

repo_url: https://github.com/giangvanhung/quanlysinhvien
repo_name: quanlysinhvien

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/giangvanhung/quanlysinhvien
      name: GitHub — Giang Văn Hưng
